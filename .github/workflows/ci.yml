name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
    tags: [v*]
  pull_request:
    branches: [main, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COMPOSE_FILE: docker/docker-compose.prod-testnet.local.yml

jobs:
  # ==========================================
  # Route-Layer Tests (no network, fast)
  # ==========================================
  route-layer:
    name: Route-Layer Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & test backend
        working-directory: ./backend
        run: |
          bun install
          bunx prisma generate
          bun test --path-ignore-patterns='**/integration/**'

      - name: Install & test privacy-proxy
        working-directory: ./privacy-proxy
        run: |
          bun install
          bun test

  # ==========================================
  # Frontend Build
  # ==========================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Front-end

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
        continue-on-error: true
      - run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder

  # ==========================================
  # Haweya Build
  # ==========================================
  haweya:
    name: Haweya Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./haweya

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx prisma generate
      - run: bunx tsc --noEmit
        continue-on-error: true

  # ==========================================
  # Full Stack Integration Tests
  # Spins up the exact stack from docker-compose
  # and runs tests against real services
  # ==========================================
  integration:
    name: Full Stack Integration
    runs-on: ubuntu-latest
    needs: [route-layer, frontend, haweya]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend deps (for test runner)
        working-directory: ./backend
        run: bun install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: bunx prisma generate

      - name: Build & start full stack
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} build --parallel
          docker compose -f ${{ env.COMPOSE_FILE }} up -d
        env:
          PROXY_SECRET: ci-test-proxy-secret
          JWT_SECRET: ci-test-jwt-secret
          ENCRYPTION_KEY: ci-test-encryption-key-1234567890123456
          PLATFORM_SECRET: ci-test-platform-secret
          COSMOS_BACKEND_MNEMONIC: "clip grass isolate course hunt diesel sting record sort tent salon letter tail neck assist hazard clerk begin menu damage toast attend tree cake"

      - name: Wait for proxy health
        run: |
          echo "Waiting for stack..."
          for i in $(seq 1 60); do
            curl -s http://localhost:4000/api/health > /dev/null && echo "Proxy ready" && curl -s http://localhost:4000/api/health && break
            if [ "$i" -eq 60 ]; then echo "Timeout waiting for stack" && exit 1; fi
            sleep 5
          done

      - name: Run integration tests
        working-directory: ./backend
        run: bun test tests/integration

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=50

      - name: Stop stack
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v

  # ==========================================
  # Build & Push Docker Images to GHCR
  # ==========================================
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          SERVICES="backend frontend haweya proxy chain"
          for svc in $SERVICES; do
            echo "tags_$svc=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc:${{ github.sha }}" >> $GITHUB_OUTPUT
          done

      - name: Build & push all images via compose
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} build --parallel
          for svc in backend frontend haweya privacy-proxy sawtak-node-1; do
            IMG_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${svc/sawtak-node-/chain}"
            docker tag sawtak-$svc:latest $IMG_NAME:latest
            docker tag sawtak-$svc:latest $IMG_NAME:${{ github.sha }}
            docker push $IMG_NAME:latest
            docker push $IMG_NAME:${{ github.sha }}
          done
        env:
          PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PLATFORM_SECRET: ${{ secrets.PLATFORM_SECRET }}
          COSMOS_BACKEND_MNEMONIC: ${{ secrets.COSMOS_BACKEND_MNEMONIC }}

  # ==========================================
  # GitHub Release
  # ==========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate release manifest
        run: |
          cat > release-manifest.json << 'MANIFEST'
          {
            "version": "${{ github.ref_name }}",
            "stack": "docker-compose.prod-testnet.local.yml",
            "images": [
              "ghcr.io/${{ github.repository }}-backend",
              "ghcr.io/${{ github.repository }}-frontend",
              "ghcr.io/${{ github.repository }}-haweya",
              "ghcr.io/${{ github.repository }}-proxy",
              "ghcr.io/${{ github.repository }}-chain"
            ],
            "sha": "${{ github.sha }}"
          }
          MANIFEST

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sawtak ${{ github.ref_name }}
          body_path: release-manifest.json
          files: |
            docker/docker-compose.prod-testnet.local.yml
            release-manifest.json
          generate_release_notes: true
