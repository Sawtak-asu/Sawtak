name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]

jobs:
  route-layer:
    name: Route-Layer Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & test backend
        working-directory: ./backend
        run: |
          bun install
          bunx prisma generate
          bun test --path-ignore-patterns='**/integration/**'

      - name: Install & test privacy-proxy
        working-directory: ./privacy-proxy
        run: |
          bun install
          bun test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Front-end

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
        continue-on-error: true
      - run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_HAWEYA_URL: ${{ vars.NEXT_PUBLIC_HAWEYA_URL || 'http://localhost:3030' }}
          NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${{ vars.NEXT_PUBLIC_HAWEYA_CLIENT_ID || 'sawtak_client' }}
          INTERNAL_API_URL: http://localhost:4000

  haweya:
    name: Haweya Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./haweya

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx prisma generate
      - run: bunx tsc --noEmit
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [route-layer, frontend, haweya]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sawtak
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend deps
        working-directory: ./backend
        run: |
          bun install
          bunx prisma generate

      - name: Install ts-client deps
        working-directory: ./network/Sawtak/ts-client
        run: bun install

      - name: Install proxy deps
        working-directory: ./privacy-proxy
        run: bun install

      - name: Push database schema
        working-directory: ./backend
        run: bunx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sawtak?schema=public

      - name: Start backend
        working-directory: ./backend
        run: |
          bun run src/server.ts &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          NODE_ENV: development
          PORT: 8000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sawtak?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REQUIRE_PROXY_AUTH: "true"
          ENABLE_HEDERA_INDEXER: "false"
          ENABLE_COSMOS_INDEXER: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          COSMOS_CHAIN_ID: ${{ secrets.COSMOS_CHAIN_ID }}
          COSMOS_BACKEND_MNEMONIC: ${{ secrets.COSMOS_BACKEND_MNEMONIC }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}

      - name: Start privacy proxy
        working-directory: ./privacy-proxy
        run: |
          bun run src/server.ts &
          echo "PROXY_PID=$!" >> $GITHUB_ENV
        env:
          NODE_ENV: development
          PROXY_PORT: 4000
          BACKEND_INTERNAL_URL: http://localhost:8000
          PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Wait for proxy
        run: |
          echo "Waiting for proxy..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health > /dev/null && echo "Proxy ready" && break
            if [ "$i" -eq 30 ]; then echo "Timeout waiting for proxy" && exit 1; fi
            sleep 2
          done

      - name: Wait for backend via proxy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/health > /dev/null && echo "Backend ready" && break
            if [ "$i" -eq 30 ]; then echo "Timeout waiting for backend" && exit 1; fi
            sleep 2
          done

      - name: Run integration tests
        working-directory: ./backend
        run: bun test tests/integration

      - name: Teardown
        if: always()
        run: |
          kill ${{ env.BACKEND_PID }} 2>/dev/null || true
          kill ${{ env.PROXY_PID }} 2>/dev/null || true
