# Prometheus Configuration for Sawtak
# Scrapes metrics from backend, Redis, and PostgreSQL

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Sawtak Backend (via Privacy Proxy)
  - job_name: 'sawtak-backend'
    static_configs:
      - targets: ['sawtak-privacy-proxy:4000']
    metrics_path: /api/metrics
    scrape_interval: 10s

  # Sawtak Proxy (its own metrics)
  - job_name: 'sawtak-proxy'
    static_configs:
      - targets: ['sawtak-privacy-proxy:4000']
    metrics_path: /proxy-metrics
    scrape_interval: 10s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 10s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']