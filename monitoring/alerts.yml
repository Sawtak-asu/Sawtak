# Sawtak - Prometheus Alert Rules
# Rules for triggering alerts based on metrics

groups:
  # ==========================================
  # Redis Alerts
  # ==========================================
  - name: redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is above 80% ({{ $value | printf \"%.1f\" }}%) on {{ $labels.instance }}."

      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis has too many connections"
          description: "Redis has {{ $value }} connected clients on {{ $labels.instance }}."

      - alert: RedisRejectedConnections
        expr: increase(redis_rejected_connections_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Redis rejected connections"
          description: "Redis rejected {{ $value }} connections in the last hour on {{ $labels.instance }}."

  # ==========================================
  # PostgreSQL Alerts
  # ==========================================
  - name: postgres
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: PostgresHighConnections
        expr: (sum by (instance) (pg_stat_activity_count) / sum by (instance) (pg_settings_max_connections)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection usage"
          description: "PostgreSQL connection usage is above 80% on {{ $labels.instance }}."

      - alert: PostgresSlowQueries
        expr: pg_slow_queries > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "PostgreSQL has {{ $value }} slow queries on {{ $labels.instance }}."

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "PostgreSQL detected {{ $value }} deadlocks in the last hour on {{ $labels.instance }}."

  # ==========================================
  # Sawtak Backend Alerts
  # ==========================================
  - name: sawtak-backend
    rules:
      - alert: BackendDown
        expr: up{job="sawtak-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sawtak backend is down"
          description: "Sawtak backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate in Sawtak backend"
          description: "Error rate is above 5% ({{ $value | printf \"%.2f\" }}) for the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency in Sawtak backend"
          description: "95th percentile latency is above 1 second ({{ $value | printf \"%.2f\" }}s)."

      - alert: RateLimitViolationsHigh
        expr: increase(rate_limit_violations_total[1h]) > 100
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit violations"
          description: "More than 100 rate limit violations in the last hour. Potential abuse detected."

  # ==========================================
  # System Alerts
  # ==========================================
  - name: system
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% on {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 80% on {{ $labels.instance }}."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk usage is above 80% on {{ $labels.instance }}."
