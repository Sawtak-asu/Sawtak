services:
  haweya-postgres:
    image: postgres:15-alpine
    container_name: haweya-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haweya
    ports:
      - "5433:5432"
    volumes:
      - haweya-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haweya"]
      interval: 5s
      timeout: 5s
      retries: 5

  haweya-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haweya-app
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      PORT: 3030
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-haweya_production_secret_change_this}
      DATABASE_URL: postgresql://postgres:postgres@haweya-postgres:5432/haweya?schema=public
    depends_on:
      haweya-postgres:
        condition: service_healthy

volumes:
  haweya-postgres-data:
