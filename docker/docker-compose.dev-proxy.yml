# ============================================
# Sawtak - Development Privacy Proxy Override
# ============================================
# Usage: docker compose -f docker/docker-compose.dev.yml \
#                       -f docker/docker-compose.dev-proxy.yml up -d
#
# Then run `bun run dev` in privacy-proxy/ and backend/ separately,
# or use this compose to run the proxy container.
# ============================================

services:
  privacy-proxy:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile
    container_name: sawtak-privacy-proxy-dev
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: development
      PROXY_PORT: 4000
      BACKEND_INTERNAL_URL: http://localhost:8000
      PROXY_SECRET: dev-proxy-secret-change-in-production
      FRONTEND_URL: http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
