# ============================================
# Sawtak - Development Database Only
# ============================================
# Usage: docker-compose -f docker/docker-compose.dev.yml up -d
# ============================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: sawtak-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sawtak
    volumes:
      - sawtak_postgres_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sawtak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sawtak-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sawtak_redis_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  sawtak_postgres_dev:
    name: sawtak_postgres_dev
  sawtak_redis_dev:
    name: sawtak_redis_dev
