# ============================================
# Sawtak - Development Database Only
# ============================================
# Usage:
#   Linux:   docker compose -f docker/docker-compose.dev.yml up -d
#   Windows: docker compose -f docker/docker-compose.dev-windows.yml up -d
# ============================================
# Note: If Linux bridge networking fails, use docker-compose.dev-linux.yml instead

services:
  postgres:
    image: postgres:15-alpine
    container_name: sawtak-postgres-dev
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sawtak
    volumes:
      - sawtak_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sawtak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sawtak-redis-dev
    restart: unless-stopped
    network_mode: host
    volumes:
      - sawtak_redis_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  sawtak_postgres_dev:
    name: sawtak_postgres_dev
  sawtak_redis_dev:
    name: sawtak_redis_dev