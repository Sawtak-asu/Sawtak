networks:
  internal:
    external: true
    name: sawtak_test_internal

services:
  sawtak-node-1:
    build:
      context: ../../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-1
    restart: always
    environment:
      - MONIKER=sawtak-node-1
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26657:26657"
      - "1317:1317"
      - "9090:9090"
    volumes:
      - sawtak_node_1_data:/root/.sawtak
      - ../../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

  sawtak-node-2:
    build:
      context: ../../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-2
    restart: always
    environment:
      - MONIKER=sawtak-node-2
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=baeb65265fdada12c5819a919c8c3b6f75b75688@sawtak-node-1:26656
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26658:26657"
      - "1318:1317"
      - "9091:9090"
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_2_data:/root/.sawtak
      - ../../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

  sawtak-node-3:
    build:
      context: ../../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-3
    restart: always
    environment:
      - MONIKER=sawtak-node-3
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=baeb65265fdada12c5819a919c8c3b6f75b75688@sawtak-node-1:26656
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26659:26657"
      - "1319:1317"
      - "9092:9090"
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_3_data:/root/.sawtak
      - ../../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

volumes:
  sawtak_node_1_data:
  sawtak_node_2_data:
  sawtak_node_3_data:
