networks:
  proxy:
    external: true
    name: sawtak_test_proxy
  privacy:
    external: true
    name: sawtak_test_privacy

services:
  privacy-proxy:
    build:
      context: ../../privacy-proxy
      dockerfile: Dockerfile
    image: sawtak-privacy-proxy:latest
    container_name: sawtak-privacy-proxy
    restart: always
    env_file: ../../.env
    environment:
      BACKEND_INTERNAL_URL: http://sawtak-backend:8000
      REDIS_HOST: sawtak-redis
    networks:
      - proxy
      - privacy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ../../Front-end
      dockerfile: Dockerfile
    image: sawtak-frontend:latest
    container_name: sawtak-frontend
    restart: always
    depends_on:
      - privacy-proxy
    env_file: ../../.env
    networks:
      - proxy
      - privacy
    ports:
      - "3000:3000"
