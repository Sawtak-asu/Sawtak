# ============================================
# Sawtak - Local Development/Production Testnet Stack
# ============================================
# Services: 
#  - Frontend (Public @ http://localhost)
#  - Privacy Proxy (Public @ http://api.localhost)
#  - Backend (Internal Only)
#  - Chain Nodes 1 & 2 (Publicly Accessible)
#  - Infrastructure (Internal Postgres & Redis)
# ============================================

services:
  # ==========================================
  # Custom Cosmos Chain - Node 1
  # ==========================================
  sawtak-node-1:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-1
    restart: always
    environment:
      - MONIKER=sawtak-node-1
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26657:26657" # Public RPC
      - "1317:1317"   # Public REST
      - "9090:9090"   # Public gRPC
    volumes:
      - sawtak_node_1_data:/root/.sawtak
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - sawtak-network

  # ==========================================
  # Custom Cosmos Chain - Node 2
  # ==========================================
  sawtak-node-2:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-2
    restart: always
    environment:
      - MONIKER=sawtak-node-2
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=baeb65265fdada12c5819a919c8c3b6f75b75688@sawtak-node-1:26656
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26658:26657" # Public RPC (Offset)
      - "1318:1317"   # Public REST (Offset)
      - "9091:9090"   # Public gRPC (Offset)
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_2_data:/root/.sawtak
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - sawtak-network

  # ==========================================
  # Infrastructure
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: sawtak-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sawtak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-sawtak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sawtak-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend (Internal Only)
  # ==========================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sawtak-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sawtak}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PROXY_SECRET: ${PROXY_SECRET}
      REQUIRE_PROXY_AUTH: "true"
      BLOCKCHAIN_RPC_URL: http://sawtak-node-1:26657
      BLOCKCHAIN_REST_URL: http://sawtak-node-1:1317
    networks:
      - internal
      - privacy
      - sawtak-network

  # ==========================================
  # Privacy Proxy (Gateway to Backend)
  # ==========================================
  privacy-proxy:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile
    container_name: sawtak-privacy-proxy
    restart: always
    depends_on:
      backend: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PROXY_PORT: 4000
      BACKEND_INTERNAL_URL: http://backend:8000
      PROXY_SECRET: ${PROXY_SECRET}
      FRONTEND_URL: http://localhost
    networks:
      - proxy
      - privacy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: ../Front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api.localhost
    container_name: sawtak-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://api.localhost
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ==========================================
  # Traefik Edge Router
  # ==========================================
  traefik:
    image: traefik:v3.0
    container_name: sawtak-traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  # ==========================================
  # Haweya (Mock Identity Provider)
  # ==========================================
  haweya-db:
    image: postgres:15-alpine
    container_name: sawtak-haweya-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haweya
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haweya"]
      interval: 10s
      timeout: 5s
      retries: 5

  haweya-app:
    build:
      context: ../haweya
      dockerfile: Dockerfile
    container_name: sawtak-haweya-app
    restart: always
    depends_on:
      haweya-db: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@haweya-db:5432/haweya?schema=public
      PORT: 3030
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.haweya.rule=Host(`haweya.localhost`)"
      - "traefik.http.routers.haweya.entrypoints=web"
      - "traefik.http.services.haweya.loadbalancer.server.port=3030"

volumes:
  sawtak_node_1_data:
  sawtak_node_2_data:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
  privacy:
    driver: bridge
  sawtak-network:
    name: sawtak-network
    driver: bridge
