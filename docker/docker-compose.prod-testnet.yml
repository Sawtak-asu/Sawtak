# ============================================
# Sawtak - Local Development/Production Testnet Stack
# ============================================
# Services: 
#  - Frontend (Public @ http://localhost)
#  - Privacy Proxy (Public @ http://api.localhost)
#  - Backend (Internal Only)
#  - Chain Nodes 1 & 2 (Publicly Accessible)
#  - Infrastructure (Internal Postgres & Redis)
# ============================================

services:
  # ==========================================
  # Custom Cosmos Chain - Node 1
  # ==========================================
  sawtak-node-1:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-1
    restart: always
    environment:
      - MONIKER=sawtak-node-1
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
      - NODE_TYPE=genesis
    ports:
      - "26657:26657" # Public RPC
      - "1317:1317"   # Public REST
      - "9090:9090"   # Public gRPC
    volumes:
      - sawtak_node_1_data:/root/.sawtak
      - sawtak_shared_genesis:/shared
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - sawtak-network

  # ==========================================
  # Custom Cosmos Chain - Node 2
  # ==========================================
  sawtak-node-2:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-2
    restart: always
    environment:
      - MONIKER=sawtak-node-2
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
      - NODE_TYPE=validator
    ports:
      - "26658:26657" # Public RPC (Offset)
      - "1318:1317"   # Public REST (Offset)
      - "9091:9090"   # Public gRPC (Offset)
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_2_data:/root/.sawtak
      - sawtak_shared_genesis:/shared
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - sawtak-network

  # ==========================================
  # Custom Cosmos Chain - Node 3
  # ==========================================
  sawtak-node-3:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-3
    restart: always
    environment:
      - MONIKER=sawtak-node-3
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
      - NODE_TYPE=validator
    ports:
      - "26659:26657" # Public RPC (Offset)
      - "1319:1317"   # Public REST (Offset)
      - "9092:9090"   # Public gRPC (Offset)
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_3_data:/root/.sawtak
      - sawtak_shared_genesis:/shared
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - sawtak-network

  # ==========================================
  # Infrastructure
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: sawtak-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sawtak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-sawtak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sawtak-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal
      - privacy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend (Internal Only)
  # ==========================================
  backend:
    image: sawtak-backend:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: sawtak-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "bunx prisma db push --accept-data-loss && bun run dist/server.js"
    environment:
      NODE_ENV: production
      PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sawtak}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PROXY_SECRET: ${PROXY_SECRET}
      REQUIRE_PROXY_AUTH: "true"

      # Cosmos Chain
      COSMOS_CHAIN_ID: ${COSMOS_CHAIN_ID:-sawtak-testnet-1}
      COSMOS_RPC_ENDPOINT: http://sawtak-node-1:26657
      COSMOS_GRPC_ENDPOINT: http://sawtak-node-1:9090
      COSMOS_REST_ENDPOINT: http://sawtak-node-1:1317
      COSMOS_ADDRESS_PREFIX: ${COSMOS_ADDRESS_PREFIX:-sawtak}
      COSMOS_BACKEND_MNEMONIC: ${COSMOS_BACKEND_MNEMONIC}
      INDEXER_START_HEIGHT: ${INDEXER_START_HEIGHT:-0}
      INDEXER_POLL_INTERVAL: ${INDEXER_POLL_INTERVAL:-10000}
      ENABLE_HEDERA_INDEXER: "false"
      ENABLE_COSMOS_INDEXER: "true"

      # Auth
      HAWEYA_ISSUER_URL: http://sawtak-haweya-app:3030
      HAWEYA_CLIENT_ID: ${HAWEYA_CLIENT_ID:-sawtak_client}
      HAWEYA_CLIENT_SECRET: ${HAWEYA_CLIENT_SECRET:-sawtak_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PLATFORM_SECRET: ${PLATFORM_SECRET}
      BACKEND_PRIVATE_KEY_PEM: ${BACKEND_PRIVATE_KEY_PEM}

      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-sawtak-public-evidence}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}

      # Pinata IPFS
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_API_SECERT_KEY: ${PINATA_API_SECERT_KEY:-}
      PINATA_JWT: ${PINATA_JWT:-}
    networks:
      - internal
      - privacy
      - sawtak-network

  # ==========================================
  # Privacy Proxy (Gateway to Backend)
  # ==========================================
  privacy-proxy:
    image: sawtak-privacy-proxy:latest
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile
    container_name: sawtak-privacy-proxy
    restart: always
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PROXY_PORT: 4000
      BACKEND_INTERNAL_URL: http://backend:8000
      PROXY_SECRET: ${PROXY_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - proxy
      - privacy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    image: sawtak-frontend:latest
    build:
      context: ../Front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_HAWEYA_URL: ${NEXT_PUBLIC_HAWEYA_URL:-http://haweya.localhost}
        NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    container_name: sawtak-frontend
    restart: always
    depends_on:
      - privacy-proxy
    environment:
      NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_HAWEYA_URL: ${NEXT_PUBLIC_HAWEYA_URL:-http://haweya.localhost}
      NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    networks:
      - proxy
      - privacy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ==========================================
  # Traefik Edge Router
  # ==========================================
  traefik:
    image: traefik:v3.0
    container_name: sawtak-traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
    networks:
      - proxy

  # ==========================================
  # Haweya (Mock Identity Provider)
  # ==========================================
  haweya-db:
    image: postgres:15-alpine
    container_name: sawtak-haweya-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haweya
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haweya"]
      interval: 10s
      timeout: 5s
      retries: 5

  haweya-app:
    image: sawtak-haweya-app:latest
    build:
      context: ../haweya
      dockerfile: Dockerfile
    container_name: sawtak-haweya-app
    restart: always
    depends_on:
      haweya-db: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@haweya-db:5432/haweya?schema=public
      PORT: 3030
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.haweya.rule=Host(`haweya.localhost`)"
      - "traefik.http.routers.haweya.entrypoints=web"
      - "traefik.http.services.haweya.loadbalancer.server.port=3030"

volumes:
  sawtak_node_1_data:
  sawtak_node_2_data:
  sawtak_node_3_data:
  sawtak_shared_genesis:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
  privacy:
    driver: bridge
  sawtak-network:
    name: sawtak-network
    driver: bridge
