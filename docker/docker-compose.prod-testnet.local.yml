# ============================================
# Sawtak - Local Testnet Stack (Podman)
# ============================================
# Usage:
#   podman compose -f docker/docker-compose.prod-testnet.local.yml up -d
#
# Architecture:
#   User → Traefik (port 80) → Frontend / Privacy Proxy
#   Privacy Proxy → Backend (internal only)
#   Backend → Postgres, Redis, Cosmos Nodes
#
# Why separate containers:
#   Each service is isolated with its own process, restarts independently,
#   has its own resource limits, and can be scaled individually.
#   A single monolithic container would be a single point of failure.
# ============================================
name: sawtak

services:
  # ==========================================
  # Custom Cosmos Chain - Node 1
  # ==========================================
  sawtak-node-1:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-1
    restart: always
    environment:
      - MONIKER=sawtak-node-1
      - CHAIN_ID=sawtak-testnet-1
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26657:26657" # RPC
      - "1317:1317" # REST
      - "9090:9090" # gRPC
    volumes:
      - sawtak_node_1_data:/root/.sawtak
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

  # ==========================================
  # Custom Cosmos Chain - Node 2
  # ==========================================
  sawtak-node-2:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-2
    restart: always
    environment:
      - MONIKER=sawtak-node-2
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=baeb65265fdada12c5819a919c8c3b6f75b75688@sawtak-node-1:26656
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26658:26657"
      - "1318:1317"
      - "9091:9090"
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_2_data:/root/.sawtak
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

  # ==========================================
  # Custom Cosmos Chain - Node 3
  # ==========================================
  sawtak-node-3:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    image: sawtak-node:latest
    container_name: sawtak-node-3
    restart: always
    environment:
      - MONIKER=sawtak-node-3
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=baeb65265fdada12c5819a919c8c3b6f75b75688@sawtak-node-1:26656
      - SAWTAK_BACKEND_PUBKEY=${SAWTAK_BACKEND_PUBKEY}
    ports:
      - "26659:26657"
      - "1319:1317"
      - "9092:9090"
    depends_on:
      - sawtak-node-1
    volumes:
      - sawtak_node_3_data:/root/.sawtak
      - ../network/Sawtak/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro,Z
    networks:
      - internal

  # ==========================================
  # Infrastructure — Postgres
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: sawtak-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sawtak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-sawtak}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Infrastructure — Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: sawtak-redis
    restart: always
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
      - privacy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend (Internal Only — no public ports)
  # ==========================================
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: sawtak-backend:latest
    container_name: sawtak-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Run migrations before starting the server
    command: >
      sh -c "bunx prisma migrate deploy && bun run dist/server.js"
    environment:
      NODE_ENV: production
      PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sawtak}?schema=public

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Privacy Proxy Trust
      PROXY_SECRET: ${PROXY_SECRET}
      REQUIRE_PROXY_AUTH: "true"

      # Cosmos Chain (primary blockchain)
      COSMOS_CHAIN_ID: ${COSMOS_CHAIN_ID:-sawtak-testnet-1}
      COSMOS_RPC_ENDPOINT: http://sawtak-node-1:26657
      COSMOS_GRPC_ENDPOINT: http://sawtak-node-1:9090
      COSMOS_REST_ENDPOINT: http://sawtak-node-1:1317
      COSMOS_ADDRESS_PREFIX: ${COSMOS_ADDRESS_PREFIX:-sawtak}
      COSMOS_BACKEND_MNEMONIC: ${COSMOS_BACKEND_MNEMONIC}
      INDEXER_START_HEIGHT: ${INDEXER_START_HEIGHT:-0}
      INDEXER_POLL_INTERVAL: ${INDEXER_POLL_INTERVAL:-10000}

      # Indexer toggles
      ENABLE_HEDERA_INDEXER: "false"
      ENABLE_COSMOS_INDEXER: "true"

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      HAWEYA_ISSUER_URL: http://sawtak-haweya-app:3030
      HAWEYA_CLIENT_ID: ${HAWEYA_CLIENT_ID:-sawtak_client}
      HAWEYA_CLIENT_SECRET: ${HAWEYA_CLIENT_SECRET:-sawtak_secret}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PLATFORM_SECRET: ${PLATFORM_SECRET}
      BACKEND_PRIVATE_KEY_PEM: ${BACKEND_PRIVATE_KEY_PEM}

      # IPFS (Pinata)
      PINATA_JWT: ${PINATA_JWT:-}
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_SECRET_API_KEY: ${PINATA_SECRET_API_KEY:-}

      # Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-sawtak-public-evidence}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    networks:
      - internal
      - privacy

  # ==========================================
  # Privacy Proxy (Gateway — public via Traefik)
  # ==========================================
  privacy-proxy:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile
    image: sawtak-privacy-proxy:latest
    container_name: sawtak-privacy-proxy
    restart: always
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PROXY_PORT: 4000
      BACKEND_INTERNAL_URL: http://backend:8000
      PROXY_SECRET: ${PROXY_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - proxy
      - privacy
    ports:
      - "4000:4000"

  # ==========================================
  # Frontend (direct port mapping for local)
  # ==========================================
  frontend:
    build:
      context: ../Front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
        INTERNAL_API_URL: http://privacy-proxy:4000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_HAWEYA_URL: http://localhost:3030
        NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    image: sawtak-frontend:latest
    container_name: sawtak-frontend
    restart: always
    depends_on:
      - privacy-proxy
    environment:
      NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
      INTERNAL_API_URL: http://privacy-proxy:4000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_HAWEYA_URL: ${NEXT_PUBLIC_HAWEYA_URL:-http://localhost:3030}
      NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    networks:
      - proxy
      - privacy
    ports:
      - "3000:3000"

  # ==========================================
  # Haweya — Mock Identity Provider
  # ==========================================
  haweya-db:
    image: postgres:15-alpine
    container_name: sawtak-haweya-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haweya
    volumes:
      - haweya_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haweya"]
      interval: 10s
      timeout: 5s
      retries: 5

  haweya-app:
    build:
      context: ../haweya
      dockerfile: Dockerfile
    image: sawtak-haweya-app:latest
    container_name: sawtak-haweya-app
    restart: always
    depends_on:
      haweya-db: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@haweya-db:5432/haweya?schema=public
      PORT: 3030
    networks:
      - proxy
      - internal
    ports:
      - "3030:3030"

volumes:
  sawtak_node_1_data:
  sawtak_node_2_data:
  sawtak_node_3_data:
  postgres_data:
  redis_data:
  haweya_postgres_data:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
  privacy:
    driver: bridge
