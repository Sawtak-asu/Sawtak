version: '3.8'

services:
  sawtak-node-1:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    container_name: sawtak-node-1
    restart: unless-stopped
    environment:
      - MONIKER=sawtak-node-1
      - CHAIN_ID=sawtak-testnet-1
    ports:
      - "26657:26657" # RPC
      - "1317:1317"   # REST
      - "9090:9090"   # gRPC
    volumes:
      - sawtak_node_1_data:/root/.sawtak
    networks:
      - sawtak-network

  sawtak-node-2:
    build:
      context: ../network/Sawtak
      dockerfile: Dockerfile
    container_name: sawtak-node-2
    restart: unless-stopped
    environment:
      - MONIKER=sawtak-node-2
      - CHAIN_ID=sawtak-testnet-1
      - PERSISTENT_PEERS=${NODE1_ID}@sawtak-node-1:26656
    ports:
      - "26658:26657"
      - "1318:1317"
      - "9091:9090"
    volumes:
      - sawtak_node_2_data:/root/.sawtak
    networks:
      - sawtak-network

volumes:
  sawtak_node_1_data:
  sawtak_node_2_data:

networks:
  sawtak-network:
    external: true
    name: sawtak-network
