# ============================================
# Sawtak - Production Docker Compose
# ============================================
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Architecture: 4 containers + Traefik + Optional Monitoring
# ============================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: sawtak-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sawtak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-sawtak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed - internal only

  # ==========================================
  # Redis - Rate Limiting & Caching
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: sawtak-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal
      - privacy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed - internal only

  # ==========================================
  # Backend Service (Monolith API)
  # ==========================================
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: sawtak-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "bunx prisma db push --accept-data-loss && bun run dist/server.js"
    environment:
      NODE_ENV: production
      PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sawtak}?schema=public
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Rate Limiting
      RATE_LIMIT_ANONYMOUS_HOURLY: ${RATE_LIMIT_ANONYMOUS_HOURLY:-5}
      RATE_LIMIT_IDENTIFIED_HOURLY: ${RATE_LIMIT_IDENTIFIED_HOURLY:-20}
      RATE_LIMIT_API_HOURLY: ${RATE_LIMIT_API_HOURLY:-100}
      
      # JWT & Encryption
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PLATFORM_SECRET: ${PLATFORM_SECRET}
      BACKEND_PRIVATE_KEY_PEM: ${BACKEND_PRIVATE_KEY_PEM}
      
      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      
      # Pinata IPFS
      PINATA_API_KEY: ${PINATA_API_KEY}
      PINATA_API_SECERT_KEY: ${PINATA_API_SECERT_KEY}
      PINATA_JWT: ${PINATA_JWT}
      
      # Cosmos Chain
      COSMOS_CHAIN_ID: ${COSMOS_CHAIN_ID:-sawtak-mainnet-1}
      COSMOS_RPC_ENDPOINT: ${COSMOS_RPC_ENDPOINT}
      COSMOS_GRPC_ENDPOINT: ${COSMOS_GRPC_ENDPOINT}
      COSMOS_REST_ENDPOINT: ${COSMOS_REST_ENDPOINT}
      COSMOS_ADDRESS_PREFIX: ${COSMOS_ADDRESS_PREFIX:-sawtak}
      COSMOS_BACKEND_MNEMONIC: ${COSMOS_BACKEND_MNEMONIC}
      INDEXER_START_HEIGHT: ${INDEXER_START_HEIGHT:-0}
      INDEXER_POLL_INTERVAL: ${INDEXER_POLL_INTERVAL:-10000}
      ENABLE_HEDERA_INDEXER: "false"
      ENABLE_COSMOS_INDEXER: "true"
      
      # Auth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      HAWEYA_ISSUER_URL: ${HAWEYA_ISSUER_URL}
      HAWEYA_CLIENT_ID: ${HAWEYA_CLIENT_ID}
      HAWEYA_CLIENT_SECRET: ${HAWEYA_CLIENT_SECRET}

      # Privacy Proxy Trust
      PROXY_SECRET: ${PROXY_SECRET}
      REQUIRE_PROXY_AUTH: "true"
    networks:
      - internal
      - privacy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # No Traefik labels - backend is NOT publicly accessible
    # All traffic must go through the privacy-proxy

  # ==========================================
  # Privacy Proxy (Public API Entrypoint)
  # ==========================================
  privacy-proxy:
    build:
      context: ../privacy-proxy
      dockerfile: Dockerfile
    container_name: sawtak-privacy-proxy
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PROXY_PORT: 4000
      BACKEND_INTERNAL_URL: http://backend:8000
      PROXY_SECRET: ${PROXY_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      SESSION_MAX_AGE: 86400
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - proxy
      - privacy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  # ==========================================
  # Frontend Service
  # ==========================================
  frontend:
    build:
      context: ../Front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_HAWEYA_URL: https://haweya.${DOMAIN}
        NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    container_name: sawtak-frontend
    restart: always
    depends_on:
      - privacy-proxy
    environment:
      NEXT_PUBLIC_API_URL: http://privacy-proxy:4000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_HAWEYA_URL: https://haweya.${DOMAIN}
      NEXT_PUBLIC_HAWEYA_CLIENT_ID: ${NEXT_PUBLIC_HAWEYA_CLIENT_ID:-sawtak_client}
    networks:
      - proxy
      - privacy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # Redirect www to non-www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.routers.frontend.middlewares=www-redirect"

  # ==========================================
  # Traefik Reverse Proxy
  # ==========================================
  traefik:
    image: traefik:v3.0
    container_name: sawtak-traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # ==========================================
  # Prometheus - Metrics (Optional)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sawtak-prometheus
    restart: always
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    # No external ports - access via Grafana

  # ==========================================
  # Grafana - Dashboards (Optional)
  # ==========================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sawtak-grafana
    restart: always
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
      - proxy
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  letsencrypt_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal:
    name: sawtak-internal
    driver: bridge
  proxy:
    name: sawtak-proxy
    driver: bridge
  privacy:
    name: sawtak-privacy
    driver: bridge
