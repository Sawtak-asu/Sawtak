syntax = "proto3";

package sawtak.sawtak.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sawtak/sawtak/v1/params.proto";

option go_package = "github.com/sayedibrahimQ/sawtak/x/sawtak/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // SubmitIdentifiedComplaint defines the SubmitIdentifiedComplaint RPC.
  rpc SubmitIdentifiedComplaint(MsgSubmitIdentifiedComplaint) returns (MsgSubmitIdentifiedComplaintResponse);

  // SubmitAnonymousComplaint defines the SubmitAnonymousComplaint RPC.
  rpc SubmitAnonymousComplaint(MsgSubmitAnonymousComplaint) returns (MsgSubmitAnonymousComplaintResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sawtak/x/sawtak/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgSubmitIdentifiedComplaint defines the MsgSubmitIdentifiedComplaint message.
message MsgSubmitIdentifiedComplaint {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string tracking_id = 2;
  string title = 3;
  string text = 4;
  string category = 5;
  string area = 6;
  string directed_to = 7;
  string incident_date = 8;
  string evidence = 9;
}

// MsgSubmitIdentifiedComplaintResponse defines the MsgSubmitIdentifiedComplaintResponse message.
message MsgSubmitIdentifiedComplaintResponse {}

// MsgSubmitAnonymousComplaint defines the MsgSubmitAnonymousComplaint message.
message MsgSubmitAnonymousComplaint {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string tracking_id = 2;
  string title = 3;
  string text = 4;
  string category = 5;
  string area = 6;
  string directed_to = 7;
  string incident_date = 8;
  string evidence = 9;
  string proof = 10;
}

// MsgSubmitAnonymousComplaintResponse defines the MsgSubmitAnonymousComplaintResponse message.
message MsgSubmitAnonymousComplaintResponse {}
